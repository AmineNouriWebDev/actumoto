      .model-card {

      /* Styles pour les boutons et specs */
      .specs-btn {
        background: linear-gradient(135deg, #ff0000, #cc0000);
        color: white;
        padding: 0.5rem 1rem;

        border-radius: 6px;

        transform: translateY(-2px);
        box-shadow: 0 4px 12px rgba(255, 0, 0, 0.3);
      }

      /* Style MOBILE: spécifications dans le flux normal (poussent le contenu) */
      .specs-container {
        display: none;
        opacity: 0;
        position: relative;
        z-index: 1;
        background: white;
        padding: 0;
        margin: 0;
        width: 100%;
        max-width: 100%;
        box-sizing: border-box;
        overflow: hidden;
        height: 0;
        transform: translateY(-20px);
        transition: all 0.3s ease;
        border-top: 1px solid rgba(255, 0, 0, 0.1);
      }

      .specs-container[data-open="true"] {
        display: block;
        opacity: 1;
        height: auto;
        transform: translateY(0);
        margin-top: 0;
        animation: fadeIn 0.3s ease;
        padding: 1.5rem;
      }

      @keyframes fadeIn {
        from {
          opacity: 0;
          transform: translateY(-10px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      /* Style DESKTOP: spécifications en overlay - SIMPLIFIÉ */
      @media (min-width: 768px) {

          position: absolute;
          top: 100%; /* S'affiche juste en dessous */
          left: 0;
          right: 0;
          z-index: 1001; /* Supérieur au card-active-z */

          padding: 1.5rem;
          margin-top: 10px;
          border-radius: 12px;
          box-shadow: 0 10px 35px rgba(0, 0, 0, 0.3); /* Ombre renforcée */
          border: 1px solid rgba(255, 0, 0, 0.2);
          max-height: 0;
          overflow: hidden;
          opacity: 0;
          transform: translateY(-10px);
          transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
          border-top: none;

        .specs-container[data-open="true"] {

          max-height: 600px;

    <script>
      document.addEventListener("DOMContentLoaded", function () {
        initPage();
        // DÉSACTIVÉ - initImageModal();
      });

      function initPage() {
        const urlParams = new URLSearchParams(window.location.search);
        const brandParam = urlParams.get("marque");

        const categoryParam = urlParams.get("category");
        
        const minPriceParam = urlParams.get("minPrice");
        const maxPriceParam = urlParams.get("maxPrice");

        if (brandParam && modelsData[brandParam]) {
          showModels(brandParam);
          updateMetaTags(brandParam);
        } else if (categoryParam) {
          showModelsByCategory(categoryParam);
          // Optional: updateMetaTagsByCategory if needed, for now just use default
        } else if (minPriceParam !== null || maxPriceParam !== null) {
          const min = minPriceParam ? parseInt(minPriceParam, 10) : 0;
          let max = Infinity;
          if (maxPriceParam !== null) {
            if (maxPriceParam === "Infinity") {
              max = Infinity;
            } else {
              max = parseInt(maxPriceParam, 10);
            }
          }
          showModelsByPriceRange(min, max);
        } else {
          window.location.href = "index.html";
        }
      }

      function showModels(brand) {
        const title = document.getElementById("selected-brand");
        const count = document.getElementById("models-count");
        const container = document.getElementById("models-container");

        title.textContent = `${brand.toUpperCase()} - Modèles`;
        count.textContent = `${modelsData[brand].length} modèle(s) disponible(s)`;
        container.innerHTML = "";

        if (modelsData[brand]) {
          updateSchemaData(brand);

          
          modelsData[brand].reverse().forEach((model, index) => {
            createModelCard(model, brand, index, container);
          });


          // Afficher les contacts de la marque en bas de la page
          displayBrandContacts(brand);

          // Mettre à jour les boutons de comparaison
          setTimeout(updateCompareButtons, 0);

          // DÉSACTIVÉ - Affichage plein écran au clic sur l'image
          /* Event listeners pour l'image principale (ouvre le modal)
          document.querySelectorAll(".main-image").forEach((img) => {
            img.addEventListener("click", function () {
              const images = JSON.parse(this.dataset.images || "[]");
              const modelIndex = this.dataset.modelIndex;
              const brand = this.dataset.brand;
              const currentIndex = parseInt(this.dataset.currentIndex || "0");
              openImageModal(images, currentIndex, modelIndex, brand);
            });
          }); */

          // Event listeners pour les miniatures (change seulement l'image principale, n'ouvre pas le modal)
          document.querySelectorAll(".thumbnail").forEach((thumb) => {
            thumb.addEventListener("click", function (e) {
              e.stopPropagation();
              const imageIndex = parseInt(this.dataset.imageIndex);

              // Trouver les images du modèle
              const modelCard = this.closest(".model-card");
              const mainImage = modelCard.querySelector(".main-image");
              const images = JSON.parse(mainImage.dataset.images || "[]");

              // Mettre à jour l'image principale
              mainImage.src = images[imageIndex];
              mainImage.dataset.currentIndex = imageIndex;

              // Mettre à jour les miniatures actives
              modelCard.querySelectorAll(".thumbnail").forEach((t, idx) => {
                t.classList.toggle("active", idx === imageIndex);
              });
            });
          });

          // Fermer les fiches techniques en cliquant à l'extérieur (desktop seulement)
          document.addEventListener("click", function (e) {
            if (window.innerWidth >= 768) {
              // Si on clique sur un élément qui n'est pas une fiche technique ou un bouton qui la contrôle
              if (
                !e.target.closest(".specs-container") &&
                !e.target.closest(".specs-btn") &&
                !e.target.closest(".close-specs")
              ) {
                const openContainers = document.querySelectorAll(
                  ".specs-container[data-open='true']",
                );
                openContainers.forEach((container) => {
                  container.setAttribute("data-open", "false");
                  const btn = document.querySelector(
                    `.specs-btn[data-target-id="${container.id}"]`,
                  );
                  if (btn) {
                    btn.textContent = "Fiche technique";
                  }
                });

                // IMPORTANT: Enlever la classe z-index de toutes les cartes
                document
                  .querySelectorAll(".model-card")
                  .forEach((c) => c.classList.remove("card-active-z"));
              }
            }
          });
        }
      }

      
      function createModelCard(model, brand, index, container) {

            const modelCard = document.createElement("div");
            modelCard.className = "model-card";
            modelCard.setAttribute("role", "listitem");
            modelCard.setAttribute("data-model-index", index);

            // ID unique pour chaque fiche technique
            const uniqueId = `specs-${brand.replace(/\s+/g, "-")}-${index}`;

            // Récupérer les images
            const images = model.images || [model.image];
            const mainImage = images[0];
            const hasMultipleImages = images.length > 1;

            // Déterminer le type de carburant
            const fuelType = model.fuelType || "Thermique";
            const isElectric = fuelType === "Electrique";

            let specsHtml = "";
            if (model.specs) {
              // Créer le tableau des specs avec formatage
              let specs = [
                {
                  label: "Catégorie",
                  value: model.category || "Moto",
                },
                {
                  label: "Type moteur",
                  value: formatSpecification(
                    "typeMoteur",
                    model.specs.typeMoteur,
                    fuelType,
                  ),
                },
                {
                  label: "Cylindrée",
                  value: formatSpecification(
                    "cylindree",
                    model.specs.cylindree,
                    fuelType,
                  ),
                },
                {
                  label: "Puissance",
                  value: formatSpecification(
                    "puissance",
                    model.specs.puissance,
                    fuelType,
                  ),
                },
                {
                  label: "Couple Maximal",
                  value: formatSpecification(
                    "coupleMaximal",
                    model.specs.coupleMaximal,
                    fuelType,
                  ),
                },
                {
                  label: "Refroidissement",
                  value: formatSpecification(
                    "refroidissement",
                    model.specs.refroidissement,
                    fuelType,
                  ),
                },
                {
                  label: "Vitesse Maximale",
                  value: formatSpecification(
                    "vitesseMaximale",
                    model.specs.vitesseMaximale,
                    fuelType,
                  ),
                },
              ];

              // Ajouter tankCapacity seulement pour Thermique
              if (
                fuelType === "Thermique" &&
                model.specs.tankCapacity !== undefined
              ) {
                specs.push({
                  label: "Réservoir",
                  value: formatSpecification(
                    "tankCapacity",
                    model.specs.tankCapacity,
                    fuelType,
                  ),
                });
              }

              // Ajouter autonomie seulement pour Électrique
              if (
                fuelType === "Electrique" &&
                model.specs.autonomie !== undefined
              ) {
                specs.push({
                  label: "Autonomie",
                  value: formatSpecification(
                    "autonomie",
                    model.specs.autonomie,
                    fuelType,
                  ),
                });
              }

              specs.push({
                label: "Alimentation",
                value: formatSpecification(
                  "alimentation",
                  model.specs.alimentation,
                  fuelType,
                ),
              });

              // Afficher freinage avec systemeFreinage si présent
              let freinageLabel = "Freinage";
              let freinageValue = formatSpecification(
                "freinage",
                model.specs.freinage || "-",
                fuelType,
              );
              if (model.specs.systemeFreinage) {
                freinageValue += ` - ${model.specs.systemeFreinage}`;
              }
              specs.push({ label: freinageLabel, value: freinageValue });

              specsHtml = `
                <div class="specs-container" id="${uniqueId}" data-open="false">
                  <table class="specs-table">
                    <thead>
                      <tr>
                        <th>Caractéristique</th>
                        <th>Détail</th>
                      </tr>
                    </thead>
                    <tbody>
                      ${specs
                        .map(
                          (spec) => `
                        <tr>
                          <td>${spec.label}</td>
                          <td>${spec.value || "–"}</td>
                        </tr>
                      `,
                        )
                        .join("")}
                    </tbody>
                  </table>
                  <div class="close-specs" data-target-id="${uniqueId}">✕ Fermer la fiche</div>
                </div>
              `;
            }

            // Générer les miniatures (seulement si plus d'une image)
            let thumbnailsHtml = "";
            if (hasMultipleImages) {
              thumbnailsHtml = `
                <div class="image-thumbnails">
                  ${images
                    .slice(0, 4)
                    .map(
                      (img, imgIndex) => `
                    <img 
                      src="${img}" 
                      alt="Miniature ${imgIndex + 1}" 
                      class="thumbnail ${imgIndex === 0 ? "active" : ""}" 
                      data-image-index="${imgIndex}"
                      data-model-index="${index}"
                      data-brand="${brand}"
                      onerror="this.style.display='none'"
                    >
                  `,
                    )
                    .join("")}
                  ${
                    images.length > 4
                      ? `<div class="text-xs text-gray-500 self-center">+${
                          images.length - 4
                        }</div>`
                      : ""
                  }
                </div>
              `;
            }

            modelCard.innerHTML = `
              <div class="card-inner">
                <div class="image-container">
                  ${
                    hasMultipleImages
                      ? `
                    <!-- DÉSACTIVÉ - Compteur de photos
                    <div class="more-images-indicator">
                      <span>${images.length}</span> photos
                    </div>
                    -->
                  `
                      : ""
                  }
                  <img 
                    src="${mainImage}" 
                    alt="${model.name} - ${brand}" 
                    class="main-image" 
                    data-images='${JSON.stringify(images)}'
                    data-current-index="0"
                    data-model-index="${index}"
                    data-brand="${brand}"
                    width="400"
                    height="300"
                    onerror="this.src='./img/placeholder-moto.jpg'"
                    loading="lazy"
                  >
                </div>
                ${thumbnailsHtml}
                <div class="card-content">
                  <div class="flex justify-between items-end gap-3 mb-3">
                    <div class="flex flex-col items-start">
                      <h2 class="futurist-font text-xl leading-none mt-0.5">${model.name}</h2>
                      ${isElectric ? '<div class="electric-badge mt-1.5"><span>⚡</span> ÉLECTRIQUE</div>' : ""}
                    </div>
                    <div class="flex flex-col items-end text-right">
                      ${formatPriceHtml(model.price, model.currency || "DT")}
                    </div>
                  </div>
                  
                  <div class="card-footer">
                    <div class="flex items-stretch gap-4 w-full">
                      <button class="compare-btn flex-1 py-1.5 px-0 rounded-md border-2 border-gray-800 bg-transparent text-gray-800 hover:bg-gray-800 hover:text-white transition-all flex items-center justify-center shadow-sm gap-1 font-bold text-sm leading-none" title="Ajouter au comparateur" data-brand="${brand}" data-model-index="${index}" data-name="${model.name.replace(/"/g, '&quot;')}" data-price="${model.price}" data-image="${mainImage}" onclick="toggleCompare(this, '${brand}', ${index})">
                        
                        <span class="compare-text">Comparer</span>
                      </button>
                      ${
                        model.specs
                          ? `<button class="specs-btn flex-1 flex items-center justify-center text-center m-0 leading-none" style="padding: 0.35rem 0;" data-target-id="${uniqueId}" data-card-index="${index}">Fiche technique</button>`
                          : ""
                      }
                    </div>
                    ${specsHtml}
                  </div>
                </div>
              </div>
            `;

            container.appendChild(modelCard);

            // Gestion des événements pour les fiches techniques
            if (model.specs) {
              const btn = modelCard.querySelector(".specs-btn");
              const closeBtn = modelCard.querySelector(".close-specs");

              if (btn) {
                btn.addEventListener("click", function (e) {
                  e.preventDefault();
                  e.stopPropagation();

                  const targetId = this.getAttribute("data-target-id");
                  const specsContainer = document.getElementById(targetId);

                  // Récupérer la carte parente
                  const currentCard = this.closest(".model-card");

                  if (!specsContainer) {
                    console.error("Container not found:", targetId);
                    return;
                  }

                  // 1. Fermer toutes les autres fiches ouvertes
                  const allOpenContainers = document.querySelectorAll(
                    ".specs-container[data-open='true']",
                  );

                  // Réinitialiser les Z-index de toutes les cartes
                  const allCards = document.querySelectorAll(".model-card");
                  allCards.forEach((card) =>
                    card.classList.remove("card-active-z"),
                  );

                  allOpenContainers.forEach((otherContainer) => {
                    if (otherContainer.id !== targetId) {
                      otherContainer.setAttribute("data-open", "false");
                      // Réinitialiser le texte du bouton correspondant
                      const otherBtn = document.querySelector(
                        `.specs-btn[data-target-id="${otherContainer.id}"]`,
                      );
                      if (otherBtn) {
                        otherBtn.textContent = "Fiche technique";
                      }
                    }
                  });

                  // 2. Basculer l'état de la fiche actuelle
                  const isOpen =
                    specsContainer.getAttribute("data-open") === "true";

                  if (!isOpen) {
                    // OUVRE
                    specsContainer.setAttribute("data-open", "true");
                    this.textContent = "✕ Fermer";

                    // Si on est sur Desktop, on applique le correctif de z-index
                    if (window.innerWidth >= 768) {
                      currentCard.classList.add("card-active-z");
                    }
                  } else {
                    // FERME
                    specsContainer.setAttribute("data-open", "false");
                    this.textContent = "Fiche technique";
                    currentCard.classList.remove("card-active-z");
                  }
                });
              }

              if (closeBtn) {
                closeBtn.addEventListener("click", function (e) {
                  e.preventDefault();
                  e.stopPropagation();

                  const targetId = this.getAttribute("data-target-id");
                  const specsContainer = document.getElementById(targetId);
                  const currentCard = this.closest(".model-card");

                  if (specsContainer) {
                    specsContainer.setAttribute("data-open", "false");
                    const btn = document.querySelector(
                      `.specs-btn[data-target-id="${targetId}"]`,
                    );
                    if (btn) {
                      btn.textContent = "Fiche technique";
                    }
                    if (currentCard)
                      currentCard.classList.remove("card-active-z");
                  }
                });
              }
            }
          
      }

      function showModelsByCategory(category) {
        const title = document.getElementById("selected-brand");
        const count = document.getElementById("models-count");
        const container = document.getElementById("models-container");

        title.textContent = `CATÉGORIE: ${category.toUpperCase()}`;
        container.innerHTML = "";

        let matchingCount = 0;

        if (typeof modelsData !== 'undefined') {
          const groupedByBrand = {};
          
          Object.keys(modelsData).forEach(brand => {
            const models = modelsData[brand].filter(model => 
              model.category && model.category.toLowerCase() === category.toLowerCase()
            );
            
            if (models.length > 0) {
              groupedByBrand[brand] = models.reverse();
              matchingCount += models.length;
            }
          });

          // Render grouped models
          Object.keys(groupedByBrand).sort().forEach(brand => {
            // Add brand header
            const header = document.createElement("div");
            header.className = "brand-group-header";
            header.textContent = brand;
            container.appendChild(header);

            // Add model cards
            groupedByBrand[brand].forEach((model, index) => {
              createModelCard(model, brand, index, container);
            });
          });
        }

        count.textContent = `${matchingCount} modèle(s) disponible(s)`;
        
        // Hide brand contacts if any (they are specific to brands)
        const contactsContainer = document.getElementById("brand-contacts-container");
        if (contactsContainer) {
            contactsContainer.innerHTML = "";
        }

        setTimeout(updateCompareButtons, 0);

        // Event listeners pour les miniatures
        document.querySelectorAll(".thumbnail").forEach((thumb) => {
          thumb.addEventListener("click", function (e) {
            e.stopPropagation();
            const imageIndex = parseInt(this.dataset.imageIndex);
            const modelCard = this.closest(".model-card");
            const mainImage = modelCard.querySelector(".main-image");
            const images = JSON.parse(mainImage.dataset.images || "[]");
            
            mainImage.src = images[imageIndex];
            mainImage.dataset.currentIndex = imageIndex;
            
            modelCard.querySelectorAll(".thumbnail").forEach((t, idx) => {
              t.classList.toggle("active", idx === imageIndex);
            });
          });
        });

        // Fermer les fiches techniques en cliquant à l'extérieur (desktop seulement)
        document.addEventListener("click", function (e) {
          if (window.innerWidth >= 768) {
            if (
              !e.target.closest(".specs-container") &&
              !e.target.closest(".specs-btn") &&
              !e.target.closest(".close-specs")
            ) {
              const openContainers = document.querySelectorAll(".specs-container[data-open='true']");
              openContainers.forEach((container) => {
                container.setAttribute("data-open", "false");
                const btn = document.querySelector(`.specs-btn[data-target-id="${container.id}"]`);
                if (btn) btn.textContent = "Fiche technique";
              });
              document.querySelectorAll(".model-card").forEach((c) => c.classList.remove("card-active-z"));
            }
          }
        });
      }

      function showModelsByPriceRange(minPrice, maxPrice) {
        const title = document.getElementById("selected-brand");
        const count = document.getElementById("models-count");
        const container = document.getElementById("models-container");

        const formatK = (p) => p === Infinity ? "..." : (Math.round(p / 1000) + "K");

        let titleText = "Motos ";
        if (maxPrice === Infinity) {
          titleText += `Plus de ${formatK(minPrice)}`;
        } else if (minPrice === 0) {
          titleText += `Moins de ${formatK(maxPrice)}`;
        } else {
          titleText += `Entre ${formatK(minPrice)} et ${formatK(maxPrice)}`;
        }
        
        title.textContent = titleText;
        container.innerHTML = "";

        let matchingCount = 0;

        if (typeof modelsData !== 'undefined') {
          const groupedByBrand = {};
          
          Object.keys(modelsData).forEach(brand => {
            const models = modelsData[brand].filter(model => {
              const price = parseFloat(model.price);
              return !isNaN(price) && price >= minPrice && price <= maxPrice;
            });
            
            if (models.length > 0) {
              groupedByBrand[brand] = models.reverse();
              matchingCount += models.length;
            }
          });

          // Render grouped models
          Object.keys(groupedByBrand).sort().forEach(brand => {
            // Add brand header
            const header = document.createElement("div");
            header.className = "brand-group-header";
            header.textContent = brand;
            container.appendChild(header);

            // Add model cards
            groupedByBrand[brand].forEach((model, index) => {
              createModelCard(model, brand, index, container);
            });
          });
        }

        count.textContent = `${matchingCount} modèle(s) disponible(s)`;
        
        // Hide brand contacts if any (they are specific to brands)
        const contactsContainer = document.getElementById("brand-contacts-container");
        if (contactsContainer) {
            contactsContainer.innerHTML = "";
        }

        setTimeout(updateCompareButtons, 0);

        // Event listeners pour les miniatures
        document.querySelectorAll(".thumbnail").forEach((thumb) => {
          thumb.addEventListener("click", function (e) {
            e.stopPropagation();
            const imageIndex = parseInt(this.dataset.imageIndex);
            const modelCard = this.closest(".model-card");
            const mainImage = modelCard.querySelector(".main-image");
            const images = JSON.parse(mainImage.dataset.images || "[]");
            
            mainImage.src = images[imageIndex];
            mainImage.dataset.currentIndex = imageIndex;
            
            modelCard.querySelectorAll(".thumbnail").forEach((t, idx) => {
              t.classList.toggle("active", idx === imageIndex);
            });
          });
        });

        // Fermer les fiches techniques en cliquant à l'extérieur (desktop seulement)
        document.addEventListener("click", function (e) {
          if (window.innerWidth >= 768) {
            if (
              !e.target.closest(".specs-container") &&
              !e.target.closest(".specs-btn") &&
              !e.target.closest(".close-specs")
            ) {
              const openContainers = document.querySelectorAll(".specs-container[data-open='true']");
              openContainers.forEach((container) => {
                container.setAttribute("data-open", "false");
                const btn = document.querySelector(`.specs-btn[data-target-id="${container.id}"]`);
                if (btn) btn.textContent = "Fiche technique";
              });
              document.querySelectorAll(".model-card").forEach((c) => c.classList.remove("card-active-z"));
            }
          }
        });
      }

function updateMetaTags(brand) {
        document.title = `Modèles ${brand} - actumoto.tn | Moto Tunisie`;
        document.querySelector('meta[name="description"]').content =
          `Découvrez tous les modèles ${brand} disponibles chez actumoto.tn. Prix, photos et caractéristiques des motos ${brand} en Tunisie.`;

        document.querySelector('meta[property="og:title"]').content =
          `Modèles ${brand} - actumoto.tn`;
        document.querySelector('meta[property="og:description"]').content =
          `Modèles ${brand} disponibles en Tunisie chez actumoto.tn`;
      }

      function updateSchemaData(brand) {
        const schemaScript = document.getElementById("dynamic-schema");
        const models = modelsData[brand];

        const schemaData = {
          "@context": "https://schema.org",
          "@type": "ItemList",
          name: `Modèles ${brand}`,
          description: `Collection des modèles de motos ${brand} disponibles`,
          url: window.location.href,
          numberOfItems: models.length,
          itemListElement: models.map((model, index) => ({
            "@type": "ListItem",
            position: index + 1,
            item: {
              "@type": "Product",
              name: model.name,
              description: `${model.name} - ${brand}`,
              category: model.type,
              offers: {
                "@type": "Offer",
                price: model.price,
                priceCurrency: "TND",
              },
            },
          })),
        };

        schemaScript.textContent = JSON.stringify(schemaData);
      }

      // Fonction pour afficher les contacts de la marque en bas de la page
      function displayBrandContacts(brand) {
        const contactsSection = document.getElementById(
          "brand-contacts-section",
        );

        if (!contactsSection) return;

        if (typeof dealersContacts === "undefined" || !dealersContacts[brand]) {
          contactsSection.innerHTML = ""; // Aucun contact, ne rien afficher
          return;
        }

        const contacts = dealersContacts[brand];
        let contactContent = "";

        if (contacts.addresses && contacts.addresses.length > 0) {
          contactContent += `
            <div class="contact-item">
              <div class="contact-icon">📍</div>
              <div class="contact-details">
                ${contacts.addresses.map((addr) => `<div class="contact-line">${addr}</div>`).join("")}
              </div>
            </div>
          `;
        }

        if (contacts.phones && contacts.phones.length > 0) {
          contactContent += `
            <div class="contact-item">
              <div class="contact-icon">☎️</div>
              <div class="contact-details">
                ${contacts.phones.map((phone) => `<div class="contact-line"><a href="tel:${phone}">${phone}</a></div>`).join("")}
              </div>
            </div>
          `;
        }

        if (contacts.emails && contacts.emails.length > 0) {
          contactContent += `
            <div class="contact-item">
              <div class="contact-icon">📧</div>
              <div class="contact-details">
                ${contacts.emails.map((email) => `<div class="contact-line"><a href="mailto:${email}">${email}</a></div>`).join("")}
              </div>
            </div>
          `;
        }

        if (contacts.website) {
          contactContent += `
            <div class="contact-item">
              <div class="contact-icon">🌐</div>
              <div class="contact-details">
                <div class="contact-line"><a href="${contacts.website}" target="_blank" rel="noopener noreferrer">${contacts.website.replace(/^https?:\/\//, "")}</a></div>
              </div>
            </div>
          `;
        }

        // Section réseaux sociaux
        let socialContent = "";
        if (
          contacts.facebook ||
          contacts.instagram ||
          contacts.youtube ||
          contacts.x
        ) {
          socialContent += `<div class="contact-item social-item">`;

          if (contacts.facebook) {
            socialContent += `<a href="${contacts.facebook}" class="social-link facebook" target="_blank" rel="noopener noreferrer" title="Facebook" aria-label="Suivez-nous sur Facebook">f</a>`;
          }
          if (contacts.instagram) {
            socialContent += `<a href="${contacts.instagram}" class="social-link instagram" target="_blank" rel="noopener noreferrer" title="Instagram" aria-label="Suivez-nous sur Instagram">📷</a>`;
          }
          if (contacts.youtube) {
            socialContent += `<a href="${contacts.youtube}" class="social-link youtube" target="_blank" rel="noopener noreferrer" title="YouTube" aria-label="Abonnez-vous sur YouTube">▶️</a>`;
          }
          if (contacts.x) {
            socialContent += `<a href="${contacts.x}" class="social-link x" target="_blank" rel="noopener noreferrer" title="X" aria-label="Suivez-nous sur X">𝕏</a>`;
          }

          socialContent += `</div>`;
          contactContent += socialContent;
        }

        if (contactContent) {
          contactsSection.innerHTML = `
            <div class="brand-contacts">
              <h3 class="futurist-font contacts-title">Coordonnées du concessionnaire</h3>
              ${contactContent}
            </div>
          `;
        } else {
          contactsSection.innerHTML = "";
        }
      }

      // --- LOGIQUE DU COMPARATEUR ---
      let compareList = JSON.parse(localStorage.getItem('comparateur_selection')) || [];

      function toggleCompare(btn, brand, modelIndex) {
          const name = btn.getAttribute('data-name');
          const price = btn.getAttribute('data-price');
          const image = btn.getAttribute('data-image');
          
          const existingIndex = compareList.findIndex(item => item.brand === brand && item.modelIndex === modelIndex);
          
          if (existingIndex >= 0) {
              // Retirer
              compareList.splice(existingIndex, 1);
          } else {
              // Ajouter
              compareList.push({ brand, modelIndex, name, price, image });
          }
          
          localStorage.setItem('comparateur_selection', JSON.stringify(compareList));
          updateCompareButtons();
          updateComparateurBar();
      }

      function updateCompareButtons() {
          document.querySelectorAll('.compare-btn').forEach(btn => {
              const brand = btn.getAttribute('data-brand');
              const modelIndex = parseInt(btn.getAttribute('data-model-index'));
              const exists = compareList.some(item => item.brand === brand && item.modelIndex === modelIndex);
              const span = btn.querySelector('.compare-text');
              
              if (exists) {
                  btn.classList.add('bg-green-600', 'border-green-600', 'text-white', 'hover:bg-green-700', 'hover:border-green-700');
                  btn.classList.remove('bg-transparent', 'border-gray-800', 'text-gray-800', 'hover:bg-gray-800', 'hover:text-white');
                  btn.setAttribute('title', 'Retirer du comparateur');
                  if (span) span.textContent = 'Comparé ✓';
              } else {
                  btn.classList.remove('bg-green-600', 'border-green-600', 'text-white', 'hover:bg-green-700', 'hover:border-green-700');
                  btn.classList.add('bg-transparent', 'border-gray-800', 'text-gray-800', 'hover:bg-gray-800', 'hover:text-white');
                  btn.setAttribute('title', 'Ajouter au comparateur');
                  if (span) span.textContent = 'Comparer';
              }
          });
      }

      function updateComparateurBar() {
          const bar = document.getElementById('comparateur-bar');
          const container = document.getElementById('comparateur-items');
          const count = document.getElementById('comparateur-count');
          const btn = document.getElementById('comparateur-btn-go');
          
          if (!bar) return; // Si la barre n'est pas chargée
          
          if (compareList.length > 0) {
              bar.classList.add('translate-y-0');
              bar.classList.remove('translate-y-full');
              
              count.textContent = compareList.length + (compareList.length > 1 ? " motos" : " moto");
              
              container.innerHTML = compareList.map(item => `
                  <div class="relative bg-white rounded overflow-hidden shadow border border-gray-200 w-16 h-16 sm:w-20 sm:h-20 flex-shrink-0 bg-white p-1">
                      <img src="${item.image}" alt="${item.name}" class="w-full h-full object-contain">
                      <button onclick="removeCompare('${item.brand}', ${item.modelIndex})" class="absolute top-0 right-0 bg-red-600 text-white rounded-bl-lg w-5 h-5 flex items-center justify-center text-xs hover:bg-red-700 transition-colors shadow-sm z-10" title="Retirer">✕</button>
                  </div>
              `).join('');
              
              // On peut comparer à partir de 2 motos (ou 1 si on veut juste voir sa fiche, mais 2 c'est plus logique)
              if (compareList.length >= 2) {
                  btn.classList.remove('opacity-50', 'cursor-not-allowed', 'pointer-events-none');
              } else {
                  btn.classList.add('opacity-50', 'cursor-not-allowed', 'pointer-events-none');
              }
          } else {
              bar.classList.remove('translate-y-0');
              bar.classList.add('translate-y-full');
          }
      }

      function removeCompare(brand, modelIndex) {
          const existingIndex = compareList.findIndex(item => item.brand === brand && item.modelIndex === modelIndex);
          if (existingIndex >= 0) {
              compareList.splice(existingIndex, 1);
              localStorage.setItem('comparateur_selection', JSON.stringify(compareList));
              updateCompareButtons();
              updateComparateurBar();
          }
      }

      // Initialiser la barre au chargement
      document.addEventListener('DOMContentLoaded', () => {
          updateComparateurBar();
          
          // Mobile Menu Logic
          const burgerMenu = document.getElementById('burger-menu');
          const mobileNav = document.getElementById('mobile-nav');

          if (burgerMenu && mobileNav) {
            burgerMenu.addEventListener('click', () => {
              burgerMenu.classList.toggle('active');
              mobileNav.classList.toggle('active');
              document.body.style.overflow = mobileNav.classList.contains('active') ? 'hidden' : '';
            });

            // Close menu when clicking links
            const mobileLinks = mobileNav.querySelectorAll('a');
            mobileLinks.forEach(link => {
              link.addEventListener('click', () => {
                burgerMenu.classList.remove('active');
                mobileNav.classList.remove('active');
                document.body.style.overflow = '';
              });
            });
          }
      });
    </script>
